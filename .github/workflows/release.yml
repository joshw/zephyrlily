name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # Generate the curl-pipe installer from .config/binstaller.yml, pinning the
      # checksums GoReleaser just published, and attach it to the release. Runs
      # after GoReleaser so the release (binaries + checksums.txt) already exists.
      - name: Build and upload install.sh
        run: |
          go install github.com/binary-install/binstaller/cmd/binst@latest
          binst embed-checksums --config .config/binstaller.yml \
            --version "${GITHUB_REF_NAME}" --mode download
          binst gen --config .config/binstaller.yml -o install.sh
          gh release upload "${GITHUB_REF_NAME}" install.sh --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
